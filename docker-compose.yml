services:
    tunnelgate:
        # image: container.magify.tech/tunnelgate/tunnelgate:v1.0.0
        build:
            context: .
            dockerfile: dockerfile
        # platform: linux/amd64
        environment:
            ADMIN_PORT: 9200
            APP_PORT: 9280
        user: "nginx"
        ports:
            - "9200:80"
            - "9280:9280"
        volumes:
            - tunnelgate_data:/app/tunnelgate/data
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:$${ADMIN_PORT:-9200}/api/v1/healthz"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s

volumes:
    tunnelgate_data:
